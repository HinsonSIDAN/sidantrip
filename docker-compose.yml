services:
  agent:
    build: .
    ports:
      - "${PORT:-8001}:${PORT:-8001}"
    environment:
      - SIDANTRIP_DB_PATH=/app/data
      - SIDANTRIP_LLM_MODEL=${SIDANTRIP_LLM_MODEL:-gemini/gemini-2.5-flash}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PLANNER_MAX_CONCURRENT=${PLANNER_MAX_CONCURRENT:-20}
      - PORT=${PORT:-8001}
